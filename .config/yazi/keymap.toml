[[mgr.prepend_keymap]]
on = ["g", "a"]
run = "cd ~/Videos"
desc = "Go to Anime"

[[mgr.prepend_keymap]]
on = ["g", "D"]
run = "cd ~/Documents"
desc = "Go to Documents"

[[mgr.prepend_keymap]]
on = ["g", "d"]
run = "cd ~/Dev"
desc = "Go to Dev/"

[[mgr.prepend_keymap]]
on = ["g", "w"]
run = "cd ~/Work"
desc = "Go to Work/"

[[mgr.prepend_keymap]]
on = ["g", "."]
run = "cd ~/.dotfiles"
desc = "Go to Dotfiles"

[[mgr.prepend_keymap]]
on = ["T"]
run = "plugin toggle-pane min-preview"
desc = "Toggle preview pane"

[[mgr.prepend_keymap]]
on = ["f"]
run = "plugin jump-to-char"
desc = "Jump to file by first character"

[[mgr.prepend_keymap]]
on = ["c", "m"]
run = "plugin chmod"
desc = "chmod selected files"

[[mgr.prepend_keymap]]
on = ["d", "f"]
run = "plugin diff"
desc = "Diff selected file with hovered file"

[[mgr.prepend_keymap]]
on = ["g", "c"]
run = "plugin vcs-files"
desc = "Show Git files changes"

[[mgr.prepend_keymap]]
on = ["g", "p"]
run = "cd ~/Pictures/"
desc = "Go to Pictures"

[[mgr.prepend_keymap]]
on = ["d"]
run = "gio"
desc = "Move to trash"

[[mgr.prepend_keymap]]
on = ["D"]
run = "remove"
desc = "Permanently delete"
