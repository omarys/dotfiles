exclude: "SKILL.md"
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: check-case-conflict
      - id: check-json
      - id: check-merge-conflict
      - id: check-yaml
      - id: detect-aws-credentials
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: mixed-line-ending
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: ["-x"]
        exclude: ^(\.zshrc|\.zprofile|\.zshenv|\.config/zsh/|.*\.zsh)$
  - repo: https://github.com/google/yamlfmt
    rev: v0.21.0
    hooks:
      - id: yamlfmt
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
        exclude: ^\.config/qutebrowser/config\.py$
      - id: ruff-format
        exclude: ^\.config/qutebrowser/config\.py$
  - repo: local
    hooks:
      - id: trufflehog
        name: TruffleHog
        description: Detect secrets in dotfiles before commit/push.
        entry: bash -c 'trufflehog git file://. --since-commit HEAD --results=verified,unknown --fail'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit, pre-push]
